name: iOS Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate
          echo "--- Verifying resources in project ---"
          grep -c "species_seed" Currents.xcodeproj/project.pbxproj || echo "WARNING: species_seed not found in project!"
          grep -c "gear_catalog_seed" Currents.xcodeproj/project.pbxproj || echo "WARNING: gear_catalog_seed not found in project!"

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Currents.xcodeproj \
            -scheme Currents \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Install iOS Simulator
        run: |
          # Check if iOS 26 runtime is already available
          if xcrun simctl list runtimes | grep -q "iOS 26"; then
            echo "iOS 26 runtime already installed"
          else
            echo "Downloading iOS simulator runtime..."
            xcodebuild -downloadPlatform iOS
          fi
          # List available runtimes and devices
          xcrun simctl list runtimes
          xcrun simctl list devicetypes | grep iPhone | tail -5

      - name: Create Simulator
        run: |
          # Get the latest iOS 26 runtime ID
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          runtimes = [r for r in data['runtimes'] if 'iOS' in r.get('name','') and '26' in r.get('name','') and r.get('isAvailable', False)]
          if runtimes:
              print(runtimes[-1]['identifier'])
          ")
          if [ -z "$RUNTIME" ]; then
            echo "No iOS 26 runtime found, skipping tests"
            echo "SKIP_TESTS=true" >> $GITHUB_ENV
            exit 0
          fi
          echo "Using runtime: $RUNTIME"

          # Use iPhone 16 Pro device type
          DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro"
          echo "Using device type: $DEVICE_TYPE"

          # Create and boot the simulator
          UDID=$(xcrun simctl create "CI-iPhone" "$DEVICE_TYPE" "$RUNTIME")
          echo "Created simulator: $UDID"
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" || true

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Currents.xcodeproj \
            -scheme Currents \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log

      - name: Test
        if: env.SKIP_TESTS != 'true'
        run: |
          set -o pipefail
          xcodebuild test \
            -project Currents.xcodeproj \
            -scheme CurrentsTests \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test.log

      - name: Package .app for Appetize
        run: |
          PRODUCTS_DIR="DerivedData/Build/Products/Debug-iphonesimulator"
          APP_PATH="$PRODUCTS_DIR/Currents.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Expected .app not at $APP_PATH"
            echo "Searching DerivedData for .app bundles:"
            find DerivedData -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          echo "Contents of .app:"
          ls -laR "$APP_PATH/"
          echo "Total .app: $(du -sh "$APP_PATH" | cut -f1)"
          echo "--- Checking for seed JSON files ---"
          find "$APP_PATH" -name "*.json" -o -name "*.JSON" 2>/dev/null || echo "NO JSON FILES FOUND IN BUNDLE"

          cd "$PRODUCTS_DIR"
          zip -r "$GITHUB_WORKSPACE/Currents-simulator.zip" "Currents.app"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Currents-simulator
          path: Currents-simulator.zip
          retention-days: 30

      - name: Build unsigned IPA (for sideloading)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Currents.xcodeproj \
            -scheme Currents \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData-Device \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee device-build.log

          # Package as IPA
          PRODUCTS_DIR="DerivedData-Device/Build/Products/Release-iphoneos"
          APP_PATH="$PRODUCTS_DIR/Currents.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Device .app not found, searching:"
            find DerivedData-Device -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          echo "Device .app contents:"
          ls -laR "$APP_PATH/"
          echo "Device .app size: $(du -sh "$APP_PATH" | cut -f1)"

          # Fakesign with ldid for sideloading (TrollStore/Sideloader compatible)
          if command -v ldid &>/dev/null; then
            echo "Signing with ldid..."
            ldid -S"$GITHUB_WORKSPACE/ios/Currents/App/Currents.entitlements" "$APP_PATH/Currents"
          else
            echo "ldid not found, installing..."
            brew install ldid
            ldid -S"$GITHUB_WORKSPACE/ios/Currents/App/Currents.entitlements" "$APP_PATH/Currents"
          fi

          # Create IPA structure: Payload/Currents.app
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          cd "$(dirname Payload)" || true
          zip -r "$GITHUB_WORKSPACE/Currents.ipa" Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Currents-IPA
          path: Currents.ipa
          retention-days: 90

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/build.log
            ios/test.log

      - name: Summary
        if: always()
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          if grep -q "BUILD SUCCEEDED" build.log 2>/dev/null; then
            echo "Build: passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "Build: **FAILED**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "error:" build.log 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if grep -q "TEST SUCCEEDED" test.log 2>/dev/null; then
            echo "Tests: passed" >> $GITHUB_STEP_SUMMARY
          elif [ -f test.log ]; then
            echo "Tests: check logs" >> $GITHUB_STEP_SUMMARY
          else
            echo "Tests: skipped (no simulator runtime)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download **Currents-simulator** artifact to test on [Appetize.io](https://appetize.io)" >> $GITHUB_STEP_SUMMARY

  testflight:
    name: Archive & Upload to TestFlight
    needs: build-and-test
    runs-on: macos-15
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install App Store Connect API Key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/private_keys
          KEY_PATH=~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          printf '%s\n' "$ASC_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "Key file size: $(wc -c < "$KEY_PATH") bytes"
          head -1 "$KEY_PATH"
          tail -1 "$KEY_PATH"
          echo "ASC_KEY_ID length: ${#ASC_KEY_ID}"
          echo "ASC_ISSUER_ID length: ${#ASC_ISSUER_ID}"

      - name: Setup keychain and signing certificate
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euxo pipefail

          # --- 1. Generate a fresh private key + CSR ---
          openssl req -new -newkey rsa:2048 -nodes \
            -keyout ~/private_keys/dist.key \
            -out ~/private_keys/dist.csr \
            -subj "/CN=Currents Distribution/O=Aidan McConnon/C=US"

          # --- 2. Generate JWT for App Store Connect API ---
          python3 - "$ASC_KEY_ID" "$ASC_ISSUER_ID" ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 <<'PYSCRIPT'
          import json, sys, time, subprocess, base64

          key_id, issuer_id, key_path = sys.argv[1], sys.argv[2], sys.argv[3]

          def b64url(data):
              if isinstance(data, str): data = data.encode()
              return base64.urlsafe_b64encode(data).rstrip(b'=').decode()

          header = b64url(json.dumps({"alg": "ES256", "kid": key_id, "typ": "JWT"}))
          now = int(time.time())
          payload = b64url(json.dumps({"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}))
          signing_input = f"{header}.{payload}"

          sig = subprocess.run(
              ["openssl", "dgst", "-sha256", "-sign", key_path, "-binary"],
              input=signing_input.encode(), capture_output=True, check=True
          ).stdout
          jwt_token = f"{signing_input}.{b64url(sig)}"

          with open("/tmp/asc_jwt.txt", "w") as f:
              f.write(jwt_token)
          print(f"JWT generated (length: {len(jwt_token)})")
          PYSCRIPT

          JWT=$(cat /tmp/asc_jwt.txt)

          # --- 3. Revoke existing distribution certs (key is lost between runs) ---
          for CERT_TYPE in DISTRIBUTION IOS_DISTRIBUTION; do
            echo "Checking for existing $CERT_TYPE certificates..."
            CERTS=$(curl -sf -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=$CERT_TYPE" || echo '{"data":[]}')
            CERT_IDS=$(echo "$CERTS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for cert in data.get('data', []):
              print(cert['id'])
          " || true)
            if [ -n "$CERT_IDS" ]; then
              echo "$CERT_IDS" | while read -r CERT_ID; do
                echo "Revoking old $CERT_TYPE certificate: $CERT_ID"
                curl -s -X DELETE \
                  -H "Authorization: Bearer $JWT" \
                  "https://api.appstoreconnect.apple.com/v1/certificates/$CERT_ID" || true
              done
            else
              echo "No existing $CERT_TYPE certificates found"
            fi
          done

          # --- 4. Create new Apple Distribution certificate with our CSR ---
          python3 - ~/private_keys/dist.csr <<'PYSCRIPT'
          import json, sys
          csr_path = sys.argv[1]
          csr_content = open(csr_path).read()
          payload = {
              "data": {
                  "type": "certificates",
                  "attributes": {
                      "certificateType": "DISTRIBUTION",
                      "csrContent": csr_content
                  }
              }
          }
          with open("/tmp/cert_request.json", "w") as f:
              json.dump(payload, f)
          PYSCRIPT

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            "https://api.appstoreconnect.apple.com/v1/certificates" \
            -d @/tmp/cert_request.json)

          echo "$RESPONSE" | python3 -c "
          import json, sys, base64
          data = json.load(sys.stdin)
          if 'errors' in data:
              for e in data['errors']:
                  print(f'API Error: {e.get(\"detail\", e)}', file=sys.stderr)
              sys.exit(1)
          cert_b64 = data['data']['attributes']['certificateContent']
          cert_der = base64.b64decode(cert_b64)
          with open('$HOME/private_keys/dist.cer', 'wb') as f:
              f.write(cert_der)
          print('Apple Distribution certificate created successfully')
          "

          # --- 5. Setup keychain ---
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # --- 6. Install Apple WWDR intermediate + root certificates ---
          curl -sL "https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer" \
            -o ~/private_keys/AppleWWDRCAG3.cer
          security import ~/private_keys/AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          curl -sL "https://www.apple.com/appleca/AppleIncRootCertificate.cer" \
            -o ~/private_keys/AppleRoot.cer
          security import ~/private_keys/AppleRoot.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          # --- 7. Create p12 from matching key + cert and import ---
          openssl x509 -inform DER -in ~/private_keys/dist.cer -out ~/private_keys/dist.pem
          openssl pkcs12 -export -out ~/private_keys/dist.p12 \
            -inkey ~/private_keys/dist.key \
            -in ~/private_keys/dist.pem \
            -passout pass:temp123

          security import ~/private_keys/dist.p12 \
            -P "temp123" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # --- 8. Verify signing identity ---
          echo "Installed signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "Distribution certificate installed successfully"

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Currents.xcodeproj \
            -scheme Currents \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Currents.xcodeproj \
            -scheme Currents \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/Currents.xcarchive \
            -clonedSourcePackagesDirPath .spm-cache \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            DEVELOPMENT_TEAM=DBC26UPRGK \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            2>&1 | tee archive.log

      - name: Create ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>DBC26UPRGK</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST

      - name: Export & Upload to TestFlight
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Currents.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            2>&1 | tee export.log

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          rm -rf ~/private_keys

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-logs
          path: |
            ios/archive.log
            ios/export.log

  release-ipa:
    name: Create Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: Currents-IPA

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body: |
            Automated build from commit ${{ github.sha }}

            **Commit:** `${{ steps.sha.outputs.short }}`
            **Message:** ${{ github.event.head_commit.message }}
          files: Currents.ipa
          make_latest: true

      - name: Trigger source update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SOURCE_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/PndaMan/sidestore-source/dispatches \
            -d '{"event_type":"ipa-updated"}'
        continue-on-error: true
