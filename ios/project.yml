name: Currents
options:
  bundleIdPrefix: com.aidanmcconnon
  deploymentTarget:
    iOS: "26.0"
  minimumXcodeGenVersion: "2.42.0"

settings:
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Apple Distribution"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: "12.0.0"

targets:
  Currents:
    type: application
    platform: iOS
    sources:
      - path: Currents
        excludes:
          - "Resources/**"
      - path: Currents/Resources/Assets.xcassets
      - path: Currents/Resources/Data
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aidanmcconnon.currents
        INFOPLIST_FILE: Currents/App/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        DEVELOPMENT_TEAM: "DBC26UPRGK"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        # CODE_SIGN_ENTITLEMENTS disabled until iCloud + Push capabilities
        # are enabled on the App ID in the Apple Developer Portal. Re-enable
        # by uncommenting and adding the matching capabilities via the web UI:
        #   developer.apple.com -> Identifiers -> com.aidanmcconnon.currents
        #   -> enable iCloud (Include CloudKit), select the iCloud.* container
        #   -> enable Push Notifications
        # CODE_SIGN_ENTITLEMENTS: Currents/App/Currents.entitlements
      configs:
        Release:
          PROVISIONING_PROFILE_SPECIFIER: "Currents AppStore Manual"
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI

  CurrentsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Currents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aidanmcconnon.currents.tests
