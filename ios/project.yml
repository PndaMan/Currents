name: Currents
options:
  bundleIdPrefix: com.currents
  deploymentTarget:
    iOS: "18.0"
  minimumXcodeGenVersion: "2.42.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: "12.0.0"

targets:
  Currents:
    type: application
    platform: iOS
    sources:
      - path: Currents
        excludes:
          - "Resources/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.currents.app
        INFOPLIST_FILE: Currents/App/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI

  CurrentsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Currents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.currents.tests
